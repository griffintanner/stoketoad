<!--
  STOKE TOAD — stoketoad.com
  A weather-aware climbing conditions site for The Gunks (Shawangunk Mountains), NY

  ═══════════════════════════════════════════════════════
  DEPLOYMENT TO CLOUDFLARE PAGES
  ═══════════════════════════════════════════════════════
  1. Push this entire folder to a GitHub repository.
  2. Log in to the Cloudflare dashboard → Pages → Create Application → Connect to Git.
  3. Select your repository.
  4. Build settings:
       Build command:        (leave blank — no build step required)
       Build output directory: /
  5. Click "Save and Deploy". That's it.

  RUNNING LOCALLY:
  Open index.html directly in any modern browser.
  No server, no build step, no dependencies to install.

  WEATHER DATA:
  Fetched from Open-Meteo (https://open-meteo.com).
  Completely free. No API key required.
  Results are cached in localStorage for 6 hours.
  ═══════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Should you climb at the Gunks today? Ask the Stoke Toad.">
  <title>Stoke Toad — Gunks Conditions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1 class="site-title">STOKE TOAD</h1>
    <p class="site-sub">The Gunks</p>
  </header>

  <main>
    <div id="message-area" aria-live="polite">
      <p id="main-message"></p>
      <p id="tomorrow-message"></p>
      <p id="weather-summary"></p>
    </div>

    <section id="forecast-container" aria-hidden="true">
      <h2 class="forecast-heading">Next 48 Hours at the Gunks</h2>
      <div id="hourly-forecast" role="list"></div>
    </section>
  </main>

  <footer>
    <p>Stay tuned for more information on the annual Bubbathon!</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
